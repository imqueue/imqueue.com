<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="google-site-verification" content="lZDiiXownAih-OVzjgDS_lEpZruoAw3JCMoz3xkCVIE">
<title>{% if title %}{{ title }} · {{ siteName }}{% else %}{{ siteName }} — {{ site.slogan }}{% endif %}</title>
<meta name="description" content="{{ description | default: site.slogan }}">
<link rel="canonical" href="{{ siteUrl }}{{ page.url }}">
<link rel="icon" href="/favicon.svg?v=4" type="image/svg+xml">
<link rel="icon" href="/favicon.ico?v=4" sizes="any">
<link rel="apple-touch-icon" href="/favicon.svg?v=4">

<!-- No-FOUC theme init: apply stored theme before first paint -->
<script>(function(){try{var t=localStorage.getItem('imqueue-theme');if(t==='light'||t==='dark'){document.documentElement.setAttribute('data-theme',t);}}catch(e){}})();</script>

<link rel="stylesheet" href="/css/fonts.css">
<link rel="stylesheet" href="/css/reset.css">
<link rel="stylesheet" href="/css/theme-{{ skin }}.css">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/prose.css">
{% if pageCss %}<link rel="stylesheet" href="{{ pageCss }}">{% endif %}
